<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Shaddai — 指パッチン</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --gold-dark: #7a5c1e;
    --bg-dark: #0a0806;
    --bg-mid: #100d08;
    --text-dim: #8a7050;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg-dark);
    color: var(--gold-light);
    font-family: 'Cinzel', serif;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: radial-gradient(ellipse at 50% 30%, #1c1408 0%, #0a0806 70%);
    position: relative;
  }

  /* 星フィールド */
  #stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .scene {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.5rem;
    padding: 2rem;
  }

  /* タイトル */
  .title-group {
    text-align: center;
  }
  .title-main {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.4rem, 5vw, 2.8rem);
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 0.15em;
    text-shadow: 0 0 30px rgba(201,168,76,0.5), 0 0 60px rgba(201,168,76,0.2);
  }
  .title-sub {
    font-size: 0.75rem;
    letter-spacing: 0.4em;
    color: var(--text-dim);
    margin-top: 0.5rem;
    text-transform: uppercase;
  }

  /* 区切り線 */
  .divider {
    width: 220px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-dark), transparent);
    position: relative;
  }
  .divider::before, .divider::after {
    content: '✦';
    position: absolute;
    top: -0.6em;
    color: var(--gold);
    font-size: 0.7rem;
  }
  .divider::before { left: 50%; transform: translateX(-50%); }

  /* メインボタン */
  .btn-wrap {
    position: relative;
    width: 160px;
    height: 160px;
  }
  .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid var(--gold-dark);
    pointer-events: none;
    transition: transform 0.4s ease, opacity 0.4s ease;
  }
  .ring:nth-child(1) { inset: -8px; border-color: rgba(201,168,76,0.25); }
  .ring:nth-child(2) { inset: -18px; border-color: rgba(201,168,76,0.12); }

  .snap-btn {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 1.5px solid var(--gold);
    background: radial-gradient(circle at 40% 35%, #1e1710, #0d0a06);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    outline: none;
    position: relative;
    z-index: 2;
    box-shadow: 0 0 20px rgba(201,168,76,0.08),
                inset 0 0 20px rgba(0,0,0,0.6);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .snap-btn:hover {
    transform: scale(1.04);
    box-shadow: 0 0 35px rgba(201,168,76,0.25),
                inset 0 0 20px rgba(0,0,0,0.5);
  }
  .snap-btn:active { transform: scale(0.94); }
  .snap-btn.snapping {
    animation: snap-flash 0.35s ease-out;
  }
  @keyframes snap-flash {
    0%   { box-shadow: 0 0 20px rgba(201,168,76,0.1); }
    40%  { box-shadow: 0 0 70px rgba(201,168,76,0.7), 0 0 120px rgba(240,208,128,0.3); }
    100% { box-shadow: 0 0 20px rgba(201,168,76,0.1); }
  }

  .btn-icon {
    font-size: 3.5rem;
    line-height: 1;
    filter: drop-shadow(0 0 6px rgba(240,208,128,0.4));
    user-select: none;
  }
  .btn-label {
    font-size: 0.65rem;
    letter-spacing: 0.35em;
    color: var(--gold-dark);
    text-transform: uppercase;
  }

  /* カウンター */
  .counter-area {
    text-align: center;
  }
  .counter {
    font-family: 'Cinzel Decorative', serif;
    font-size: 3rem;
    font-weight: 700;
    color: var(--gold-light);
    text-shadow: 0 0 20px rgba(201,168,76,0.4);
    line-height: 1;
    min-width: 3ch;
    display: inline-block;
    transition: transform 0.1s;
  }
  .counter.bump {
    animation: count-bump 0.25s ease-out;
  }
  @keyframes count-bump {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.3); }
    100% { transform: scale(1); }
  }
  .counter-label {
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    margin-top: 0.5rem;
  }

  /* メッセージ */
  .message {
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    color: var(--gold);
    text-shadow: 0 0 10px rgba(201,168,76,0.3);
    min-height: 1.5em;
    text-align: center;
    transition: opacity 0.3s;
  }

  /* パーティクル */
  #particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 3;
  }
  .particle {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    opacity: 0;
  }

  /* 底部装飾 */
  .footer-rune {
    font-size: 0.6rem;
    letter-spacing: 0.5em;
    color: #3a2a10;
    text-align: center;
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>
<div id="particles"></div>

<div class="scene">
  <div class="title-group">
    <div class="title-main">El Shaddai</div>
    <div class="title-sub">Ascension of the Metatron</div>
  </div>

  <div class="divider"></div>

  <div class="btn-wrap">
    <div class="ring"></div>
    <div class="ring"></div>
    <button class="snap-btn" id="snapBtn" aria-label="指パッチン">
      <span class="btn-icon">🤌</span>
      <span class="btn-label">Snap</span>
    </button>
  </div>

  <div class="counter-area">
    <div class="counter" id="counter">0</div>
    <div class="counter-label">Snaps</div>
  </div>

  <div class="message" id="message"></div>

  <div class="footer-rune">✦ &nbsp; そなたは神に愛されし者 &nbsp; ✦</div>
</div>

// ─── 音声セットアップ ────────────────────────────────────────────────────────
let audioBuffer = null;
let audioCtx = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  // Base64 → ArrayBuffer
  const binary = atob(AUDIO_B64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  audioCtx.decodeAudioData(bytes.buffer, buf => { audioBuffer = buf; });
}

async function playSnap() {
  if (!audioCtx || !audioBuffer) return;
  // スマホブラウザ対策: suspended状態を確実に解除してから再生
  if (audioCtx.state === 'suspended') {
    await audioCtx.resume();
  }
  const src = audioCtx.createBufferSource();
  src.buffer = audioBuffer;
  // GainNodeを経由してボリュームを明示（一部Androidで必要）
  const gain = audioCtx.createGain();
  gain.gain.value = 1.0;
  src.connect(gain);
  gain.connect(audioCtx.destination);
  src.start(0);
}

// ─── 星フィールド ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('stars');
const ctx2d = canvas.getContext('2d');
let stars = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

function initStars(n = 200) {
  stars = Array.from({length: n}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.2 + 0.2,
    a: Math.random(),
    da: (Math.random() - 0.5) * 0.008
  }));
}

function drawStars() {
  ctx2d.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    s.a = Math.max(0.05, Math.min(1, s.a + s.da));
    if (s.a <= 0.05 || s.a >= 1) s.da *= -1;
    ctx2d.beginPath();
    ctx2d.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx2d.fillStyle = `rgba(201,168,76,${s.a * 0.6})`;
    ctx2d.fill();
  });
  requestAnimationFrame(drawStars);
}

window.addEventListener('resize', () => { resizeCanvas(); initStars(); });
resizeCanvas(); initStars(); drawStars();

// ─── パーティクル ─────────────────────────────────────────────────────────────
const particlesEl = document.getElementById('particles');
const COLORS = ['#f0d080','#c9a84c','#e8c060','#fff8d0','#b8942a','#ffe090'];

function spawnParticles() {
  const btn = document.getElementById('snapBtn');
  const rect = btn.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (i / 18) * Math.PI * 2 + Math.random() * 0.5;
    const dist = 60 + Math.random() * 80;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];
    const size = 2 + Math.random() * 4;
    p.style.cssText = `
      left:${cx}px; top:${cy}px;
      width:${size}px; height:${size}px;
      background:${color};
      transform:translate(-50%,-50%);
      box-shadow: 0 0 4px ${color};
    `;
    particlesEl.appendChild(p);
    p.animate([
      { transform: 'translate(-50%,-50%) scale(1)', opacity: 1 },
      { transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(0)`, opacity: 0 }
    ], {
      duration: 500 + Math.random() * 300,
      easing: 'cubic-bezier(0,0,0.2,1)',
      fill: 'forwards'
    }).onfinish = () => p.remove();
  }
}

// ─── ボタンロジック ─────────────────────────────────────────────────────────
const btn = document.getElementById('snapBtn');
const counterEl = document.getElementById('counter');
const messageEl = document.getElementById('message');

const MESSAGES = [
  '大丈夫だ、問題ない',
  'その装備で大丈夫か？',
  '彼のことが好きだから',
  '神に愛されし者よ',
  'いいぞ',
  '天界が震えた',
  '素晴らしい',
  'まだ戦える',
  '奇跡が起きた',
];

let count = 0;
let msgTimeout = null;

btn.addEventListener('pointerdown', () => { initAudio(); });
btn.addEventListener('click', async () => {
  initAudio();
  await playSnap();
  spawnParticles();

  btn.classList.remove('snapping');
  void btn.offsetWidth;
  btn.classList.add('snapping');

  count++;
  counterEl.textContent = count;
  counterEl.classList.remove('bump');
  void counterEl.offsetWidth;
  counterEl.classList.add('bump');

  messageEl.textContent = MESSAGES[Math.floor(Math.random() * MESSAGES.length)];
  if (msgTimeout) clearTimeout(msgTimeout);
  msgTimeout = setTimeout(() => { messageEl.textContent = ''; }, 2500);
});

btn.addEventListener('animationend', () => btn.classList.remove('snapping'));
counterEl.addEventListener('animationend', () => counterEl.classList.remove('bump'));
</script>
